<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KPI Card Pro</title>
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --fn:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
  --ease:cubic-bezier(.22,.68,0,1.1);
  --ease2:cubic-bezier(.16,1,.3,1);
  --t1:#0f172a;--t2:#1e293b;--t3:#475569;--t4:#94a3b8;--t5:#e2e8f0;
  --g:#16a34a;--g-bg:rgba(22,163,74,.1);--g-bdr:rgba(22,163,74,.22);
  --r:#dc2626;--r-bg:rgba(220,38,38,.1);--r-bdr:rgba(220,38,38,.22);
  --b:#2563eb;--b-bg:rgba(37,99,235,.08);--b-bdr:rgba(37,99,235,.18);
}

html,body{
  width:100%;height:100%;
  background:transparent;
  font-family:var(--fn);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

#app{
  width:calc(100% - 12px);
  height:calc(100% - 12px);
  max-width:200px;
  display:flex;align-items:center;justify-content:center;
}

/* ════════════════════════════════
   CARD — white, rounded, subtle shadow
════════════════════════════════ */
#card{
  width:100%;
  background:#fff;
  border-radius:18px;
  border:1px solid rgba(15,23,42,.06);
  overflow:hidden;
  position:relative;
  box-shadow:
    0 1px 3px rgba(15,23,42,.04),
    0 8px 24px rgba(15,23,42,.07);
  display:flex;flex-direction:column;
  animation:cardIn .5s var(--ease2) both;
  cursor:default;
  transition:box-shadow .25s var(--ease2),transform .2s var(--ease2);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(12px) scale(.97)}
  to{opacity:1;transform:none}
}
#card:hover{
  box-shadow:0 4px 14px rgba(15,23,42,.08),0 20px 44px rgba(15,23,42,.1);
  transform:translateY(-2px);
}

/* ── BODY ── */
.body{padding:16px 16px 0;position:relative;z-index:1;}

/* ── HEADER ── */
#card-hdr{
  font-size:9px;font-weight:700;
  letter-spacing:.13em;text-transform:uppercase;
  color:var(--t4);margin-bottom:12px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── HERO AMOUNT — hides on hover ── */
#amt-block{
  overflow:hidden;max-height:190px;opacity:1;
  transform:translateY(0);
  transition:
    max-height .32s var(--ease2),
    opacity .22s ease,
    transform .22s var(--ease2),
    margin .28s var(--ease2);
  margin-bottom:0;
}
#card:hover #amt-block{
  max-height:0;opacity:0;
  transform:translateY(-6px);
  margin-bottom:0;
}

#hero-val{
  font-family:var(--mono);
  font-size:32px;font-weight:700;
  color:var(--t1);
  letter-spacing:-.04em;line-height:1;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  margin-bottom:8px;
}

/* ── TARGET ATTAINMENT BAR ── */
.att-wrap{margin-bottom:8px;}
.att-hdr{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:4px;
}
.att-lbl{
  font-size:8px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--t4);
}
#att-pct{
  font-size:10px;font-weight:800;
  font-family:var(--mono);
}
.att-track{
  height:4px;background:#f1f5f9;
  border-radius:99px;overflow:hidden;
}
#att-fill{
  height:100%;border-radius:99px;
  width:0%;
  transition:width 1s var(--ease2),background .3s;
}

/* ── COMPARISON CHIPS ── */
.chips{
  display:flex;gap:5px;flex-wrap:wrap;
  margin-bottom:4px;
}
.chip{
  display:inline-flex;align-items:center;gap:3px;
  font-size:8px;font-weight:700;
  padding:3px 7px;border-radius:99px;
  white-space:nowrap;
  font-family:var(--mono);
  letter-spacing:-.01em;
  transition:transform .14s var(--ease2);
}
.chip:hover{transform:scale(1.06);}
.chip-up{background:var(--g-bg);color:var(--g);border:.5px solid var(--g-bdr);}
.chip-dn{background:var(--r-bg);color:var(--r);border:.5px solid var(--r-bdr);}
.chip-lbl{
  font-size:7px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
  opacity:.7;
}

/* ── DIVIDER — hides on hover ── */
#divider{
  height:.5px;
  background:linear-gradient(90deg,rgba(15,23,42,.07) 0%,transparent 100%);
  margin:10px 16px 8px;
  transition:margin .28s var(--ease2),opacity .2s,max-height .28s var(--ease2);
  max-height:1px;opacity:1;overflow:hidden;
}
#card:hover #divider{opacity:0;margin:0 16px;max-height:0;}

/* ════════════════════════════════
   SVG SPARKLINE — pure SVG, no external lib
════════════════════════════════ */
#chart-wrap{
  position:relative;
  padding:0 16px 12px;
  transition:padding .3s var(--ease2);
  z-index:1;
}
#card:hover #chart-wrap{
  padding:8px 16px 14px;
}

#sparkline-svg{
  width:100%;
  display:block;
  overflow:visible;
  transition:height .35s var(--ease2);
}

/* x-axis labels — appear on hover */
.x-labels{
  display:flex;justify-content:space-between;
  padding:4px 0 0;
  opacity:0;
  transition:opacity .22s ease .08s;
}
#card:hover .x-labels{opacity:1;}
.x-labels span{
  font-size:7px;font-weight:600;
  color:var(--t5);white-space:nowrap;
}

/* hover value badge on chart */
#chart-badge{
  position:absolute;top:2px;right:16px;
  font-size:8px;font-weight:700;
  font-family:var(--mono);
  background:rgba(255,255,255,.92);
  border:1px solid rgba(15,23,42,.08);
  padding:2px 7px;border-radius:7px;
  color:var(--t2);
  opacity:0;transition:opacity .2s;pointer-events:none;
  z-index:2;box-shadow:0 2px 8px rgba(15,23,42,.06);
}
#card:hover #chart-badge{opacity:1;}

/* ── LOADING ── */
#loading{
  position:absolute;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;
  background:rgba(255,255,255,.8);
  border-radius:18px;
}
.spinner{
  width:20px;height:20px;
  border:2px solid #f1f5f9;
  border-top-color:var(--b);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:10px;color:var(--t4);font-weight:500;}
</style>
</head>
<body>
<div id="app">
<div id="card">

  <div class="body">
    <div id="card-hdr">KPI</div>

    <div id="amt-block">
      <div id="hero-val">—</div>

      <div class="att-wrap" id="att-wrap" style="display:none">
        <div class="att-hdr">
          <div class="att-lbl">Target</div>
          <div id="att-pct">—</div>
        </div>
        <div class="att-track"><div id="att-fill"></div></div>
      </div>

      <div class="chips" id="chips"></div>
    </div>
  </div>

  <div id="divider"></div>

  <div id="chart-wrap">
    <svg id="sparkline-svg" viewBox="0 0 200 50" preserveAspectRatio="none" aria-label="Trend sparkline">
      <!-- built by JS -->
    </svg>
    <div id="chart-badge"></div>
    <div class="x-labels">
      <span id="xl-first"></span>
      <span id="xl-last"></span>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-txt">Loading…</div>
  </div>

</div>
</div>

<script>
'use strict';
(function(){

var $=function(id){return document.getElementById(id);};
var appEl=$('app');

/* ════════════════════════════════
   NUMBER FORMAT — no currency, smart units
════════════════════════════════ */
function fmtN(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  var abs=Math.abs(n),s=n<0?'-':'';
  if(abs>=1e12) return s+(abs/1e12).toFixed(2)+' T';
  if(abs>=1e9)  return s+(abs/1e9).toFixed(2)+' B';
  if(abs>=1e6)  return s+(abs/1e6).toFixed(2)+' M';
  if(abs>=1e3)  return s+(abs/1e3).toFixed(1)+' K';
  if(abs<10)    return s+abs.toFixed(2);
  if(abs<100)   return s+abs.toFixed(1);
  return s+Math.round(abs).toLocaleString('en-US');
}
function fmtPct(n){return n===null||isNaN(n)?'—':Math.round(n)+'%';}

/* ════════════════════════════════
   SVG SPARKLINE BUILDER — cubic bezier smoothed
════════════════════════════════ */
function buildSparkline(values,color){
  var svg=$('sparkline-svg');
  svg.innerHTML='';
  if(!values.length) return;

  var W=200, H=50;
  var n=values.length;
  var min=Math.min.apply(null,values);
  var max=Math.max.apply(null,values);
  var range=max-min||1;
  var pad=4; /* vertical padding so line doesn't clip */

  /* compute points */
  var pts=values.map(function(v,i){
    return{
      x:(n===1)?W/2:i/(n-1)*W,
      y:pad+(1-(v-min)/range)*(H-pad*2)
    };
  });

  /* build smooth cubic bezier path */
  var d='M '+pts[0].x.toFixed(1)+' '+pts[0].y.toFixed(1);
  for(var i=1;i<pts.length;i++){
    var p0=pts[i-1],p1=pts[i];
    var cpx1=p0.x+(p1.x-p0.x)*0.4;
    var cpx2=p0.x+(p1.x-p0.x)*0.6;
    d+=' C '+cpx1.toFixed(1)+' '+p0.y.toFixed(1)+
       ' '+cpx2.toFixed(1)+' '+p1.y.toFixed(1)+
       ' '+p1.x.toFixed(1)+' '+p1.y.toFixed(1);
  }

  /* gradient fill */
  var ns='http://www.w3.org/2000/svg';
  var defs=document.createElementNS(ns,'defs');
  var grad=document.createElementNS(ns,'linearGradient');
  grad.setAttribute('id','spFill');
  grad.setAttribute('x1','0');grad.setAttribute('y1','0');
  grad.setAttribute('x2','0');grad.setAttribute('y2','1');
  var s1=document.createElementNS(ns,'stop');
  s1.setAttribute('offset','0%');s1.setAttribute('stop-color',color);s1.setAttribute('stop-opacity','0.22');
  var s2=document.createElementNS(ns,'stop');
  s2.setAttribute('offset','100%');s2.setAttribute('stop-color',color);s2.setAttribute('stop-opacity','0');
  grad.appendChild(s1);grad.appendChild(s2);

  /* glow filter */
  var filter=document.createElementNS(ns,'filter');
  filter.setAttribute('id','glow');filter.setAttribute('x','-20%');
  filter.setAttribute('y','-20%');filter.setAttribute('width','140%');filter.setAttribute('height','140%');
  var blur=document.createElementNS(ns,'feGaussianBlur');
  blur.setAttribute('in','SourceGraphic');blur.setAttribute('stdDeviation','2');
  filter.appendChild(blur);

  defs.appendChild(grad);defs.appendChild(filter);
  svg.appendChild(defs);

  /* fill area under curve */
  var fillD=d+' L '+pts[pts.length-1].x.toFixed(1)+' '+H+' L '+pts[0].x.toFixed(1)+' '+H+' Z';
  var fillPath=document.createElementNS(ns,'path');
  fillPath.setAttribute('d',fillD);
  fillPath.setAttribute('fill','url(#spFill)');
  svg.appendChild(fillPath);

  /* glow line (behind main) */
  var glowLine=document.createElementNS(ns,'path');
  glowLine.setAttribute('d',d);
  glowLine.setAttribute('fill','none');
  glowLine.setAttribute('stroke',color);
  glowLine.setAttribute('stroke-width','4');
  glowLine.setAttribute('stroke-linecap','round');
  glowLine.setAttribute('filter','url(#glow)');
  glowLine.setAttribute('opacity','0.35');
  svg.appendChild(glowLine);

  /* main line */
  var line=document.createElementNS(ns,'path');
  line.setAttribute('d',d);
  line.setAttribute('fill','none');
  line.setAttribute('stroke',color);
  line.setAttribute('stroke-width','2');
  line.setAttribute('stroke-linecap','round');
  line.setAttribute('stroke-linejoin','round');
  /* animate line drawing */
  var len=line.getTotalLength?500:0;
  if(len){
    line.setAttribute('stroke-dasharray',len);
    line.setAttribute('stroke-dashoffset',len);
    line.style.transition='none';
    svg.appendChild(line);
    requestAnimationFrame(function(){
      line.style.transition='stroke-dashoffset 1.2s cubic-bezier(.16,1,.3,1)';
      line.setAttribute('stroke-dashoffset','0');
    });
  } else {
    svg.appendChild(line);
  }

  /* endpoint dot */
  var last=pts[pts.length-1];
  var dot=document.createElementNS(ns,'circle');
  dot.setAttribute('cx',last.x.toFixed(1));
  dot.setAttribute('cy',last.y.toFixed(1));
  dot.setAttribute('r','3.5');
  dot.setAttribute('fill',color);
  dot.setAttribute('stroke','#fff');
  dot.setAttribute('stroke-width','2');
  dot.style.opacity='0';
  dot.style.transition='opacity .3s .8s';
  svg.appendChild(dot);
  requestAnimationFrame(function(){dot.style.opacity='1';});
}

/* ════════════════════════════════
   RESPONSIVE
════════════════════════════════ */
function applyScale(){
  var w=$('card').offsetWidth||240;
  var heroSz=Math.max(20,Math.min(34,Math.round(w*0.14)));
  $('hero-val').style.fontSize=heroSz+'px';

  /* sparkline height based on card width */
  var svgH=Math.max(35,Math.min(60,Math.round(w*0.22)));
  $('sparkline-svg').setAttribute('viewBox','0 0 200 '+svgH);
  $('sparkline-svg').style.height=svgH+'px';
}
if(window.ResizeObserver){
  new ResizeObserver(function(){applyScale();}).observe($('card'));
}

/* ════════════════════════════════
   DATE HELPERS
════════════════════════════════ */
function parseDate(dv){
  if(!dv) return null;
  var nv=dv.nativeValue!==undefined?dv.nativeValue:dv.value;
  var fv=(dv.formattedValue||'').trim();
  if(typeof nv==='number'&&nv>1e10){var d=new Date(nv);if(d.getFullYear()>=1990) return d;}
  if(typeof nv==='number'&&nv>=1990&&nv<=2050) return new Date(nv,0,1);
  if(typeof nv==='number'&&nv>=1&&nv<=12) return new Date(2000,nv-1,1);
  if(fv){
    var iso=fv.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso) return new Date(+iso[1],+iso[2]-1,+iso[3]);
    var d2=new Date(fv);
    if(!isNaN(d2.getTime())&&d2.getFullYear()>=1990) return d2;
  }
  return null;
}
function fmtLabel(dv){
  if(!dv) return '';
  var fv=(dv.formattedValue||'').trim();
  if(fv&&fv!=='%null%'&&fv!=='Null') return fv;
  var nv=dv.nativeValue;
  if(typeof nv==='number'&&nv>=1&&nv<=12){
    var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return M[nv-1];
  }
  if(typeof nv==='number'&&nv>1e10){
    var d=new Date(nv);
    var M2=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return d.getDate()+' '+M2[d.getMonth()];
  }
  return String(nv||'');
}

/* ════════════════════════════════
   CONFIRMED WORKING DATA READER
════════════════════════════════ */
async function getData(ws){
  var rows=[],rdr=await ws.getSummaryDataReaderAsync(undefined,{ignoreSelection:true});
  for(var i=0;i<rdr.pageCount;i++){
    var pg=await rdr.getPageAsync(i);
    pg.data.forEach(function(r){
      var row={};pg.columns.forEach(function(c,idx){row[c.fieldName]=r[idx];});rows.push(row);
    });
  }
  await rdr.releaseAsync();return rows;
}
async function getEnc(ws){
  var spec=await ws.getVisualSpecificationAsync(),map={};
  if(spec.activeMarksSpecificationIndex<0) return map;
  spec.marksSpecifications[spec.activeMarksSpecificationIndex]
      .encodings.forEach(function(e){map[e.id]=e.field;});
  return map;
}
function findKey(ef,rk){
  if(!ef) return null;
  var nm=ef.name.toLowerCase();
  for(var i=0;i<rk.length;i++) if(rk[i].toLowerCase()===nm) return rk[i];
  return null;
}
function autoFind(rk,used,pats){
  for(var pi=0;pi<pats.length;pi++)
    for(var ki=0;ki<rk.length;ki++){
      if(used.indexOf(rk[ki])>=0) continue;
      if(rk[ki].toLowerCase().indexOf(pats[pi])>=0) return rk[ki];
    }
  return null;
}
function dvStr(row,k){
  if(!k||!row[k]) return null;
  var dv=row[k];
  var fv=dv.formattedValue!==undefined&&dv.formattedValue!==null?String(dv.formattedValue).trim():'';
  if(fv&&fv!=='%null%'&&fv!=='Null') return fv;
  return null;
}
function dvNum(row,k){
  if(!k||!row[k]) return null;
  var dv=row[k];
  var raw=dv.nativeValue!==undefined&&dv.nativeValue!==null?dv.nativeValue:dv.value;
  var n=parseFloat(raw);return isNaN(n)?null:n;
}

/* ════════════════════════════════
   RENDER
════════════════════════════════ */
function render(rows,enc){
  $('loading').style.display='none';
  if(!rows.length) return;
  var rk=Object.keys(rows[0]);

  var catKey =findKey(enc.category,rk);
  var heroKey=findKey(enc.hero,    rk);
  var trdKey =findKey(enc.trend,   rk);
  var datKey =findKey(enc.date,    rk);
  var used=[catKey,heroKey,trdKey,datKey].filter(Boolean);

  /* auto-detect Detail fields: target, last_month, year_end */
  var tgtKey=autoFind(rk,used,['target','budget','tgt','plan']);
  var lmKey =autoFind(rk,used,['last_month','previous','prev','prior','lm']);
  var yeKey =autoFind(rk,used,['year_end','yearend','ye','annual','fy']);

  if(!datKey) datKey=autoFind(rk,used,['date','month','day','year','period','posting']);

  /* ── header ── */
  var hdr=dvStr(rows[0],catKey);
  if(!hdr&&enc.hero) hdr=enc.hero.name.replace(/^(SUM|AVG|MAX|MIN)\((.+)\)$/i,'$2').trim();
  $('card-hdr').textContent=(hdr||'KPI').toUpperCase();

  /* ── hero amount: SUM all rows ── */
  var heroVal=null;
  if(heroKey){
    var s=0,c=0;
    rows.forEach(function(r){
      var v=dvNum(r,heroKey);if(v!==null){s+=v;c++;}
    });
    if(c>0) heroVal=s;
  }

  /* ── target, last month, year end from first row ── */
  var target =dvNum(rows[0],tgtKey);
  var lastMon=dvNum(rows[0],lmKey);
  var yearEnd=dvNum(rows[0],yeKey);

  /* if target/lm/ye are same across rows (repeated), use first row.
     If different, sum them like hero */
  function smartRead(key){
    if(!key) return null;
    var vals=[];
    rows.forEach(function(r){var v=dvNum(r,key);if(v!==null) vals.push(v);});
    if(!vals.length) return null;
    var allSame=vals.every(function(v){return v===vals[0];});
    return allSame?vals[0]:vals.reduce(function(a,b){return a+b;},0);
  }
  target =smartRead(tgtKey);
  lastMon=smartRead(lmKey);
  yearEnd=smartRead(yeKey);

  /* ── trend series ── */
  var tKey=trdKey||heroKey;
  var pts=[];
  rows.forEach(function(row){
    var val=dvNum(row,tKey);if(val===null) return;
    var lbl=datKey?fmtLabel(row[datKey]):'';
    var dateObj=datKey?parseDate(row[datKey]):null;
    pts.push({val:val,lbl:lbl,date:dateObj});
  });
  if(pts.length&&pts[0].date)
    pts.sort(function(a,b){return(a.date?a.date.getTime():0)-(b.date?b.date.getTime():0);});
  var seen={},unique=[];
  pts.forEach(function(p){if(!seen[p.lbl]){seen[p.lbl]=true;unique.push(p);}});
  pts=unique;

  if(heroVal===null&&!pts.length) return;

  var trendVals=pts.map(function(p){return p.val;});
  var labels=pts.map(function(p){return p.lbl;});

  /* fallback hero from trend */
  if(heroVal===null&&trendVals.length) heroVal=trendVals[trendVals.length-1];
  if(heroVal===null) return;

  /* ── set hero ── */
  $('hero-val').textContent=fmtN(heroVal);

  /* ── target attainment ── */
  if(target!==null&&target!==0){
    var att=Math.round((heroVal/target)*100);
    $('att-wrap').style.display='';
    $('att-pct').textContent=att+'%';
    var fillPct=Math.min(100,att);
    $('att-fill').style.width=fillPct+'%';
    var attColor=att>=100?'var(--g)':att>=75?'#d97706':'var(--r)';
    $('att-fill').style.background=attColor;
    $('att-pct').style.color=attColor;
  } else {
    $('att-wrap').style.display='none';
  }

  /* ── comparison chips ── */
  var chipsEl=$('chips');
  chipsEl.innerHTML='';

  function addChip(refVal,label){
    if(refVal===null||refVal===0) return;
    var delta=((heroVal-refVal)/Math.abs(refVal))*100;
    var up=delta>=0;
    var chip=document.createElement('span');
    chip.className='chip '+(up?'chip-up':'chip-dn');
    chip.innerHTML=
      (up?'▲':'▼')+' '+Math.abs(delta).toFixed(1)+'%'+
      ' <span class="chip-lbl">'+label+'</span>';
    chipsEl.appendChild(chip);
  }

  
  addChip(lastMon,'vs LM');
  addChip(yearEnd,'vs YE');

  /* ── sparkline ── */
  if(trendVals.length>1){
    /* pick colour by trend direction */
    var color=trendVals[trendVals.length-1]>=trendVals[0]?'#16a34a':'#dc2626';
    buildSparkline(trendVals,color);

    /* x-axis labels */
    $('xl-first').textContent=labels[0]||'';
    $('xl-last').textContent=labels[labels.length-1]||'';

    /* chart badge */
    $('chart-badge').textContent=fmtN(heroVal);
  }

  applyScale();
}

/* ════════════════════════════════
   CONFIRMED WORKING INIT
════════════════════════════════ */
window.onload=tableau.extensions.initializeAsync().then(function(){
  var ws=tableau.extensions.worksheetContent.worksheet;
  var update=async function(){
    $('loading').style.display='flex';
    var data=await getData(ws);
    var enc =await getEnc(ws);
    render(data,enc);
  };
  ws.addEventListener(tableau.TableauEventType.SummaryDataChanged,update);
  update();
});

})();
</script>
