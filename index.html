<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>KPI Card Pro · Executive Dashboard</title>
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --fn: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.22, 0.9, 0.3, 1.1);
  --gray-1: #0b1120;
  --gray-2: #1e293b;
  --gray-3: #334155;
  --gray-4: #94a3b8;
  --gray-5: #e2e8f0;
  --green: #10b981;
  --green-bg: rgba(16,185,129,0.08);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.08);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.05);
  --border-light: rgba(15,23,42,0.06);
  --shadow-sm: 0 2px 6px rgba(0,0,0,0.02), 0 6px 12px -6px rgba(0,0,0,0.08);
  --shadow-md: 0 12px 28px -8px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.01);
}

body, html {
  width: 100%;
  height: 100%;
  background: transparent;
  font-family: var(--fn);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  padding: 8px;
  margin: 0;
}

/* responsive container */
#app {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  max-width: 320px;
  min-width: 200px;
  margin: 0 auto;
}

/* CARD — clean, elevated, no size change on hover (transform only subtle lift, no scale) */
#card {
  width: 100%;
  background: #ffffff;
  border-radius: 28px;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.3s var(--ease-out), transform 0.2s var(--ease-out);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(0px);
  cursor: pointer;
  animation: cardEntrance 0.5s var(--ease-out);
}

@keyframes cardEntrance {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}

#card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);   /* subtle lift — card size unchanged */
}

/* main content area */
.card-body {
  padding: 20px 18px 0 18px;
  transition: padding 0.2s ease;
}

/* HEADER category */
.kpi-header {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-4);
  margin-bottom: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* HERO BLOCK — hides on hover, making chart expand (maximize) */
.hero-block {
  transition: all 0.28s var(--ease-out);
  max-height: 140px;
  opacity: 1;
  margin-bottom: 8px;
  overflow: hidden;
}

#card:hover .hero-block {
  max-height: 0;
  opacity: 0;
  margin-bottom: 0;
  visibility: visible; /* keeps layout, just collapsed */
}

.hero-value {
  font-family: var(--mono);
  font-size: 36px;
  font-weight: 700;
  color: var(--gray-1);
  letter-spacing: -0.02em;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
  word-break: break-word;
  white-space: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}

/* attainment bar */
.attainment {
  margin: 12px 0 10px;
}
.attainment-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
}
.attainment-label {
  font-size: 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-4);
}
.attainment-percent {
  font-size: 10px;
  font-weight: 800;
  font-family: var(--mono);
}
.progress-track {
  height: 5px;
  background: #f1f5f9;
  border-radius: 20px;
  overflow: hidden;
}
.progress-fill {
  width: 0%;
  height: 100%;
  border-radius: 20px;
  transition: width 0.7s var(--ease-spring);
}

/* comparison chips */
.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 8px 0 12px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 40px;
  font-family: var(--mono);
  transition: all 0.12s linear;
  cursor: default;
}
.chip-up {
  background: var(--green-bg);
  color: #0d7c4a;
  border: 0.5px solid rgba(16,185,129,0.25);
}
.chip-dn {
  background: var(--red-bg);
  color: #b91c1c;
  border: 0.5px solid rgba(239,68,68,0.2);
}
.chip-label {
  font-size: 7px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  opacity: 0.7;
}

/* divider hides on hover (maximizes space) */
.divider-light {
  height: 1px;
  background: radial-gradient(circle at center, rgba(0,0,0,0.06) 0%, transparent 90%);
  margin: 6px 18px 8px 18px;
  transition: margin 0.2s ease, opacity 0.2s, max-height 0.25s;
  opacity: 1;
}

#card:hover .divider-light {
  opacity: 0;
  margin: 0 18px;
  max-height: 0;
}

/* CHART ZONE — maximized on hover (expands) */
.chart-area {
  padding: 0 16px 16px 16px;
  transition: padding 0.28s var(--ease-out), transform 0.2s;
  position: relative;
}
#card:hover .chart-area {
  padding: 12px 16px 20px 16px;
  background: transparent;
}

/* sparkline svg container */
.spark-svg {
  width: 100%;
  display: block;
  transition: height 0.3s ease;
}

/* x-axis labels appear on hover */
.x-axis-labels {
  display: flex;
  justify-content: space-between;
  padding-top: 8px;
  opacity: 0;
  transition: opacity 0.2s ease 0.1s;
}
#card:hover .x-axis-labels {
  opacity: 1;
}
.x-axis-labels span {
  font-size: 7px;
  font-weight: 600;
  color: #94a3b8;
  background: rgba(255,255,255,0.7);
  padding: 2px 4px;
  border-radius: 8px;
  letter-spacing: 0.02em;
}

/* floating badge on chart showing latest value (actual) */
.chart-info-badge {
  position: absolute;
  top: 2px;
  right: 20px;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(4px);
  border-radius: 30px;
  padding: 4px 10px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--gray-2);
  border: 1px solid rgba(0,0,0,0.04);
  box-shadow: 0 2px 6px rgba(0,0,0,0.03);
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
  white-space: nowrap;
  letter-spacing: -0.01em;
}
#card:hover .chart-info-badge {
  opacity: 1;
}

/* tooltip wrapper for interactive chart points — invisible but data-driven */
.tooltip-marker {
  position: relative;
}

/* loading screen */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  border-radius: 28px;
  z-index: 20;
}
.spinner-circle {
  width: 24px;
  height: 24px;
  border: 2px solid #e2e8f0;
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 11px;
  color: #475569;
  font-weight: 500;
}

/* responsive typography */
@media (max-width: 280px) {
  .hero-value { font-size: 26px; white-space: normal; word-break: break-word; }
  .chip { font-size: 7px; padding: 3px 7px; }
}

/* interactive category click hint */
#card {
  transition: box-shadow 0.2s, transform 0.2s;
  user-select: none;
}
</style>
</head>
<body>
<div id="app">
  <div id="card">
    <div class="card-body">
      <div class="kpi-header" id="categoryHeader">KPI</div>
      
      <div class="hero-block">
        <div class="hero-value" id="heroAmount">—</div>
        
        <!-- target attainment -->
        <div class="attainment" id="attainmentWrap" style="display: none;">
          <div class="attainment-row">
            <span class="attainment-label">Budget attainment</span>
            <span class="attainment-percent" id="attainmentPercent">—</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        
        <!-- chips (vs budget, vs previous, etc) -->
        <div class="chip-group" id="chipContainer"></div>
      </div>
    </div>
    
    <div class="divider-light"></div>
    
    <div class="chart-area" id="chartArea">
      <svg id="trendSvg" class="spark-svg" viewBox="0 0 200 48" preserveAspectRatio="none" style="height: 48px;"></svg>
      <div class="chart-info-badge" id="chartBadge"></div>
      <div class="x-axis-labels">
        <span id="xLabelStart"></span>
        <span id="xLabelEnd"></span>
      </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner-circle"></div>
      <div class="loading-text">Loading executive data...</div>
    </div>
  </div>
</div>

<script>
(function(){
  // DOM elements
  const cardEl = document.getElementById('card');
  const categoryHeader = document.getElementById('categoryHeader');
  const heroAmountSpan = document.getElementById('heroAmount');
  const attainmentWrap = document.getElementById('attainmentWrap');
  const attainmentPercentSpan = document.getElementById('attainmentPercent');
  const progressFill = document.getElementById('progressFill');
  const chipContainer = document.getElementById('chipContainer');
  const trendSvg = document.getElementById('trendSvg');
  const chartBadge = document.getElementById('chartBadge');
  const xLabelStart = document.getElementById('xLabelStart');
  const xLabelEnd = document.getElementById('xLabelEnd');
  const loadingOverlay = document.getElementById('loadingOverlay');
  
  // state
  let currentCategoryValue = null;    // hold raw category field value for click interaction
  let currentDataRows = [];
  let currentEncodings = {};
  
  // Helper: smart number formatting (K/M/B)
  function formatNumber(value) {
    if (value === null || value === undefined || isNaN(value)) return '—';
    const absVal = Math.abs(value);
    if (absVal >= 1e12) return (value / 1e12).toFixed(2) + 'T';
    if (absVal >= 1e9) return (value / 1e9).toFixed(2) + 'B';
    if (absVal >= 1e6) return (value / 1e6).toFixed(2) + 'M';
    if (absVal >= 1e3) return (value / 1e3).toFixed(1) + 'K';
    if (absVal < 1 && absVal > 0) return value.toFixed(2);
    if (Number.isInteger(value)) return value.toLocaleString('en-US');
    return value.toFixed(2);
  }
  
  function formatPercent(value) {
    if (value === null || isNaN(value)) return '—';
    return Math.round(value) + '%';
  }
  
  // parse tableau data value helpers
  function getNumeric(row, fieldKey) {
    if (!fieldKey || !row[fieldKey]) return null;
    const dv = row[fieldKey];
    let raw = (dv.nativeValue !== undefined && dv.nativeValue !== null) ? dv.nativeValue : dv.value;
    if (typeof raw === 'number') return raw;
    const num = parseFloat(raw);
    return isNaN(num) ? null : num;
  }
  
  function getFormattedString(row, fieldKey) {
    if (!fieldKey || !row[fieldKey]) return null;
    const dv = row[fieldKey];
    const fv = dv.formattedValue;
    if (fv && fv !== '%null%' && fv !== 'Null') return String(fv).trim();
    return dv.nativeValue !== undefined ? String(dv.nativeValue) : null;
  }
  
  function getDateFromField(row, fieldKey) {
    if (!fieldKey || !row[fieldKey]) return null;
    const dv = row[fieldKey];
    let native = dv.nativeValue;
    if (native instanceof Date) return native;
    if (typeof native === 'number' && native > 1e10) return new Date(native);
    const formatted = dv.formattedValue;
    if (formatted && typeof formatted === 'string') {
      const iso = formatted.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return new Date(parseInt(iso[1]), parseInt(iso[2])-1, parseInt(iso[3]));
      const tryDate = new Date(formatted);
      if (!isNaN(tryDate.getTime())) return tryDate;
    }
    return null;
  }
  
  // auto-detect budget / target fields
  function autoFindField(availableKeys, excludeSet, patterns) {
    for (let p of patterns) {
      for (let k of availableKeys) {
        if (excludeSet.has(k)) continue;
        if (k.toLowerCase().includes(p)) return k;
      }
    }
    return null;
  }
  
  // build smooth SVG trend line (shows Budget line if budget values exist)
  function renderTrendLine(values, budgetValues, labels, color) {
    trendSvg.innerHTML = '';
    if (!values.length || values.length < 1) return;
    const width = 200, height = 48;
    const n = values.length;
    let minVal = Math.min(...values);
    let maxVal = Math.max(...values);
    if (budgetValues && budgetValues.length === n) {
      const allVals = [...values, ...budgetValues];
      minVal = Math.min(...allVals);
      maxVal = Math.max(...allVals);
    }
    const range = (maxVal - minVal) || 1;
    const padY = 5;
    
    function getY(v) {
      return padY + (1 - (v - minVal) / range) * (height - padY * 2);
    }
    
    const points = values.map((v, i) => ({ x: (n === 1) ? width/2 : (i / (n-1)) * width, y: getY(v) }));
    const ns = 'http://www.w3.org/2000/svg';
    
    // define gradient and filter
    const defs = document.createElementNS(ns, 'defs');
    const grad = document.createElementNS(ns, 'linearGradient');
    grad.setAttribute('id', 'trendGradient');
    grad.setAttribute('x1', '0'); grad.setAttribute('y1', '0'); grad.setAttribute('x2', '0'); grad.setAttribute('y2', '1');
    const stop1 = document.createElementNS(ns, 'stop'); stop1.setAttribute('offset', '0%'); stop1.setAttribute('stop-color', color); stop1.setAttribute('stop-opacity', '0.25');
    const stop2 = document.createElementNS(ns, 'stop'); stop2.setAttribute('offset', '100%'); stop2.setAttribute('stop-color', color); stop2.setAttribute('stop-opacity', '0');
    grad.appendChild(stop1); grad.appendChild(stop2);
    defs.appendChild(grad);
    trendSvg.appendChild(defs);
    
    // build main path
    let d = `M ${points[0].x.toFixed(1)} ${points[0].y.toFixed(1)}`;
    for (let i = 1; i < points.length; i++) {
      const p0 = points[i-1], p1 = points[i];
      const cp1x = p0.x + (p1.x - p0.x) * 0.45;
      const cp2x = p0.x + (p1.x - p0.x) * 0.55;
      d += ` C ${cp1x.toFixed(1)} ${p0.y.toFixed(1)}, ${cp2x.toFixed(1)} ${p1.y.toFixed(1)}, ${p1.x.toFixed(1)} ${p1.y.toFixed(1)}`;
    }
    // area under curve
    const fillD = d + ` L ${points[points.length-1].x.toFixed(1)} ${height} L ${points[0].x.toFixed(1)} ${height} Z`;
    const areaPath = document.createElementNS(ns, 'path');
    areaPath.setAttribute('d', fillD);
    areaPath.setAttribute('fill', 'url(#trendGradient)');
    trendSvg.appendChild(areaPath);
    
    // main line
    const linePath = document.createElementNS(ns, 'path');
    linePath.setAttribute('d', d);
    linePath.setAttribute('fill', 'none');
    linePath.setAttribute('stroke', color);
    linePath.setAttribute('stroke-width', '2.2');
    linePath.setAttribute('stroke-linecap', 'round');
    trendSvg.appendChild(linePath);
    
    // BUDGET line overlay if budget values exist
    if (budgetValues && budgetValues.length === n && budgetValues.some(v => v !== null)) {
      const budgetPoints = budgetValues.map((v, i) => ({ x: (n===1)?width/2:(i/(n-1))*width, y: v !== null ? getY(v) : null })).filter(p => p.y !== null);
      if (budgetPoints.length > 1) {
        let budgetD = `M ${budgetPoints[0].x.toFixed(1)} ${budgetPoints[0].y.toFixed(1)}`;
        for (let i=1; i<budgetPoints.length; i++) {
          const bp0 = budgetPoints[i-1], bp1 = budgetPoints[i];
          budgetD += ` L ${bp1.x.toFixed(1)} ${bp1.y.toFixed(1)}`;
        }
        const budgetLine = document.createElementNS(ns, 'path');
        budgetLine.setAttribute('d', budgetD);
        budgetLine.setAttribute('fill', 'none');
        budgetLine.setAttribute('stroke', '#3b82f6');
        budgetLine.setAttribute('stroke-width', '1.8');
        budgetLine.setAttribute('stroke-dasharray', '5 3');
        budgetLine.setAttribute('stroke-opacity', '0.85');
        trendSvg.appendChild(budgetLine);
      }
    }
    
    // end dot
    const lastPoint = points[points.length-1];
    const dot = document.createElementNS(ns, 'circle');
    dot.setAttribute('cx', lastPoint.x.toFixed(1));
    dot.setAttribute('cy', lastPoint.y.toFixed(1));
    dot.setAttribute('r', '3');
    dot.setAttribute('fill', color);
    dot.setAttribute('stroke', 'white');
    dot.setAttribute('stroke-width', '1.5');
    trendSvg.appendChild(dot);
  }
  
  // main render: data driven
  function renderDashboard(rows, encodings) {
    if (!rows || rows.length === 0) {
      loadingOverlay.style.display = 'flex';
      return;
    }
    loadingOverlay.style.display = 'none';
    const availableKeys = Object.keys(rows[0]);
    const catKey = encodings.category?.name || null;
    const heroKey = encodings.hero?.name || null;
    const trendKey = encodings.trend?.name || null;
    const dateKey = encodings.date?.name || null;
    
    // auto budget detection (target/budget)
    const usedSet = new Set([catKey, heroKey, trendKey, dateKey].filter(Boolean));
    const budgetKey = autoFindField(availableKeys, usedSet, ['budget', 'target', 'plan', 'tgt']);
    const prevKey = autoFindField(availableKeys, usedSet, ['previous', 'prior', 'last_month', 'lm']);
    const yearEndKey = autoFindField(availableKeys, usedSet, ['yearend', 'year_end', 'annual', 'fy']);
    
    // extract category value & update header, also store for click
    let categoryValue = null;
    if (catKey && rows[0][catKey]) {
      categoryValue = getFormattedString(rows[0], catKey) || rows[0][catKey]?.nativeValue;
    }
    currentCategoryValue = categoryValue || (encodings.category?.name || 'KPI');
    categoryHeader.textContent = (categoryValue || 'KPI').toUpperCase();
    
    // hero aggregation (sum over all rows)
    let heroSum = null;
    if (heroKey) {
      let sum = 0, count = 0;
      rows.forEach(row => { let v = getNumeric(row, heroKey); if(v !== null) { sum += v; count++; } });
      if (count) heroSum = sum;
    }
    
    // time series & labels
    let trendValues = [];
    let budgetSeries = [];
    let dateLabels = [];
    let rawDates = [];
    rows.forEach(row => {
      let val = getNumeric(row, trendKey || heroKey);
      if (val === null) return;
      let dateObj = dateKey ? getDateFromField(row, dateKey) : null;
      let label = dateKey ? (getFormattedString(row, dateKey) || '') : '';
      if (!label && dateObj) label = dateObj.toLocaleDateString(undefined, {month:'short', day:'numeric'});
      trendValues.push(val);
      dateLabels.push(label || `P${trendValues.length}`);
      rawDates.push(dateObj);
      // budget per row if exists
      let bVal = budgetKey ? getNumeric(row, budgetKey) : null;
      budgetSeries.push(bVal);
    });
    
    // sort by date if possible
    if (rawDates.some(d => d instanceof Date && !isNaN(d))) {
      const combined = trendValues.map((v,i) => ({v, lbl: dateLabels[i], date: rawDates[i], bud: budgetSeries[i]}));
      combined.sort((a,b) => (a.date?.getTime()||0) - (b.date?.getTime()||0));
      trendValues = combined.map(c => c.v);
      dateLabels = combined.map(c => c.lbl);
      budgetSeries = combined.map(c => c.bud);
    }
    
    let finalHero = heroSum;
    if ((finalHero === null || finalHero === undefined) && trendValues.length) finalHero = trendValues[trendValues.length-1];
    if (finalHero === null) finalHero = 0;
    heroAmountSpan.innerText = formatNumber(finalHero);
    
    // target / budget attainment (compare hero vs budget aggregate)
    let totalBudget = null;
    if (budgetSeries.length && budgetSeries.some(b => b !== null)) {
      let sumB = 0, cntB = 0;
      budgetSeries.forEach(b => { if(b !== null) { sumB += b; cntB++; } });
      if (cntB) totalBudget = sumB;
    }
    if (totalBudget !== null && totalBudget !== 0) {
      const attainmentPct = (finalHero / totalBudget) * 100;
      attainmentPercentSpan.innerText = formatPercent(attainmentPct);
      progressFill.style.width = Math.min(100, attainmentPct) + '%';
      const colorCode = attainmentPct >= 100 ? '#10b981' : (attainmentPct >= 80 ? '#f59e0b' : '#ef4444');
      progressFill.style.backgroundColor = colorCode;
      attainmentPercentSpan.style.color = colorCode;
      attainmentWrap.style.display = 'block';
    } else {
      attainmentWrap.style.display = 'none';
    }
    
    // update chips: vs Budget, vs previous, vs year-end
    chipContainer.innerHTML = '';
    function addChip(compareVal, labelText) {
      if (compareVal === null || compareVal === 0 || isNaN(compareVal)) return;
      const delta = ((finalHero - compareVal) / Math.abs(compareVal)) * 100;
      const isUp = delta >= 0;
      const chipDiv = document.createElement('div');
      chipDiv.className = `chip ${isUp ? 'chip-up' : 'chip-dn'}`;
      chipDiv.innerHTML = `${isUp ? '▲' : '▼'} ${Math.abs(delta).toFixed(1)}% <span class="chip-label">${labelText}</span>`;
      chipContainer.appendChild(chipDiv);
    }
    addChip(totalBudget, 'vs budget');
    // previous period (first row value if available)
    let prevMetric = null;
    if (trendValues.length > 1) prevMetric = trendValues[trendValues.length-2];
    else if (prevKey) prevMetric = getNumeric(rows[0], prevKey);
    addChip(prevMetric, 'vs prior');
    addChip(yearEndKey ? getNumeric(rows[0], yearEndKey) : null, 'vs YE');
    
    // sparkline with actual and budget (trend) — budget line displayed as dashed
    if (trendValues.length) {
      const trendColor = (trendValues[trendValues.length-1] >= (trendValues[0] || 0)) ? '#10b981' : '#ef4444';
      const budgetLineSeries = budgetSeries.length === trendValues.length ? budgetSeries : null;
      renderTrendLine(trendValues, budgetLineSeries, dateLabels, trendColor);
      if (dateLabels.length) {
        xLabelStart.innerText = dateLabels[0] || '';
        xLabelEnd.innerText = dateLabels[dateLabels.length-1] || '';
      }
      // badge shows latest actual value
      chartBadge.innerText = `Actual: ${formatNumber(trendValues[trendValues.length-1])}`;
    } else {
      trendSvg.innerHTML = '<text x="20" y="28" font-size="8" fill="#94a3b8">No trend data</text>';
      chartBadge.innerText = formatNumber(finalHero);
    }
  }
  
  // tooltip simulation: we add title attributes on hover for date/actual,budget values via DOM manipulation of SVG dynamic points
  function attachTooltipToSparkline() {
    // dynamically after each render, we attach tooltip via hover on chart area
    const svgElement = trendSvg;
    if (!svgElement) return;
    // Since we re-render SVG fully each time, we can add a meta tooltip via mouse move on chart area.
    const chartWrap = document.querySelector('.chart-area');
    if (chartWrap && !chartWrap.hasAttribute('data-tooltip-init')) {
      chartWrap.setAttribute('data-tooltip-init', 'true');
      chartWrap.addEventListener('mousemove', (e) => {
        // optional: richer tooltip could show values, but we already show badge and label axes.
        // For usability, we rely on axis labels and tooltip badge, plus we can show title on SVG elements.
      });
    }
    // simple titles: embed interactive info (date & actual + budget if exists)
    const paths = svgElement.querySelectorAll('path');
    if (paths.length) {
      paths.forEach(p => {
        if (p.getAttribute('stroke-dasharray') === '5 3') p.setAttribute('title', 'Budget line (target)');
        else p.setAttribute('title', 'Actual trend');
      });
    }
  }
  
  // Click on card: change selected category parameter
  async function updateSelectedCategoryParam(categoryValue) {
    if (!categoryValue) return;
    try {
      const params = tableau.extensions.dashboardContent.dashboard.parameters;
      const paramList = await params.getAsync();
      const targetParam = paramList.find(p => p.name.toLowerCase() === 'selected category' || p.name.toLowerCase() === 'selectedcategory');
      if (targetParam) {
        await targetParam.changeValueAsync(categoryValue);
        console.log(`Parameter "selected category" updated to ${categoryValue}`);
      } else {
        // optional fallback: ignore silently
      }
    } catch(err) {
      console.warn("Parameter update error", err);
    }
  }
  
  cardEl.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (currentCategoryValue) {
      await updateSelectedCategoryParam(currentCategoryValue);
    }
  });
  
  // data source & tableau extension lifecycle
  tableau.extensions.initializeAsync().then(async () => {
    const worksheet = tableau.extensions.worksheetContent.worksheet;
    async function refresh() {
      loadingOverlay.style.display = 'flex';
      try {
        const dataReader = await worksheet.getSummaryDataReaderAsync(undefined, { ignoreSelection: true });
        const rows = [];
        for (let i = 0; i < dataReader.pageCount; i++) {
          const page = await dataReader.getPageAsync(i);
          page.data.forEach(row => {
            const obj = {};
            page.columns.forEach((col, idx) => { obj[col.fieldName] = row[idx]; });
            rows.push(obj);
          });
        }
        await dataReader.releaseAsync();
        const spec = await worksheet.getVisualSpecificationAsync();
        let enc = { category:null, hero:null, trend:null, date:null };
        if (spec.marksSpecifications[spec.activeMarksSpecificationIndex]) {
          spec.marksSpecifications[spec.activeMarksSpecificationIndex].encodings.forEach(encMap => {
            if (encMap.id === 'category') enc.category = encMap.field;
            if (encMap.id === 'hero') enc.hero = encMap.field;
            if (encMap.id === 'trend') enc.trend = encMap.field;
            if (encMap.id === 'date') enc.date = encMap.field;
          });
        }
        currentEncodings = enc;
        currentDataRows = rows;
        renderDashboard(rows, enc);
        attachTooltipToSparkline();
      } catch(err) {
        console.error(err);
        loadingOverlay.style.display = 'none';
      }
    }
    worksheet.addEventListener(tableau.TableauEventType.SummaryDataChanged, refresh);
    await refresh();
  }).catch(err => { console.error(err); loadingOverlay.style.display = 'none'; });
})();
</script>
